<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Climate Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="ambient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10"/>
                    <path d="M12 2c2.5 3 4 6.5 4 10s-1.5 7-4 10"/>
                    <path d="M12 2c-2.5 3-4 6.5-4 10s1.5 7 4 10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                </svg>
                <span>Climate Hub</span>
            </div>
            <div class="weather-info" id="weather"></div>
            <div class="topbar-status">
                <span class="ws-indicator" id="ws-status" title="WebSocket"></span>
                <button class="btn-refresh" onclick="refreshDevices()" title="Refresh">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>Connecting to devices...</p>
        </div>

        <div id="error-container" class="error-banner hidden" role="alert">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-message"></span>
        </div>

        <div id="devices-container" class="devices-grid"></div>
    </main>

    <!-- Toast -->
    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
